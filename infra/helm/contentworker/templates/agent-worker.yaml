{{- if eq .Values.agents.runtime "temporal" }}
# Temporal workflow + activity host for the durable agents. Only exists when the
# durable runtime is selected; the in-process runtime needs no extra Deployment.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cw.fullname" . }}-agent-worker
  labels: {{- include "cw.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.agentWorker.replicas }}
  selector:
    matchLabels: {{- include "cw.selectorLabels" (dict "ctx" . "component" "agent-worker") | nindent 6 }}
  template:
    metadata:
      labels: {{- include "cw.selectorLabels" (dict "ctx" . "component" "agent-worker") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "cw.serviceAccountName" . }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: agent-worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["pnpm", "--filter", "@cw/agent-worker", "start"]
          envFrom:
            - configMapRef:
                name: {{ include "cw.fullname" . }}-config
            - secretRef:
                name: {{ include "cw.secretName" . }}
          resources: {{- toYaml .Values.agentWorker.resources | nindent 12 }}
{{- end }}
