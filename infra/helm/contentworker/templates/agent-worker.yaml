{{- if eq .Values.agents.runtime "temporal" }}
# Temporal workflow + activity host for the durable agents. Only exists when the
# durable runtime is selected; the in-process runtime needs no extra Deployment.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cw.fullname" . }}-agent-worker
  labels: {{- include "cw.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.agentWorker.replicas }}
  selector:
    matchLabels: {{- include "cw.selectorLabels" (dict "ctx" . "component" "agent-worker") | nindent 6 }}
  template:
    metadata:
      labels: {{- include "cw.selectorLabels" (dict "ctx" . "component" "agent-worker") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "cw.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.agentWorker.terminationGracePeriodSeconds }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- include "cw.scheduling" . | nindent 6 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: agent-worker
          image: "{{ include "cw.appImage" (dict "root" . "app" "agent-worker") }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: {{ include "cw.appCommand" (dict "root" . "app" "agent-worker") }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: HEALTH_PORT
              value: {{ .Values.agentWorker.healthPort | quote }}
          envFrom:
            - configMapRef:
                name: {{ include "cw.fullname" . }}-config
            - secretRef:
                name: {{ include "cw.secretName" . }}
          ports:
            - name: health
              containerPort: {{ .Values.agentWorker.healthPort }}
          # Healthy while the Temporal worker is polling its task queue.
          readinessProbe:
            httpGet: { path: /readyz, port: health }
            initialDelaySeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: health }
            initialDelaySeconds: 20
            periodSeconds: 20
          resources: {{- toYaml .Values.agentWorker.resources | nindent 12 }}
{{- end }}
