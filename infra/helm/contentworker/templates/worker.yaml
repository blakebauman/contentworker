apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cw.fullname" . }}-worker
  labels: {{- include "cw.labels" . | nindent 4 }}
spec:
  {{- if not .Values.worker.autoscaling.enabled }}
  replicas: {{ .Values.worker.replicas }}
  {{- end }}
  selector:
    matchLabels: {{- include "cw.selectorLabels" (dict "ctx" . "component" "worker") | nindent 6 }}
  template:
    metadata:
      labels: {{- include "cw.selectorLabels" (dict "ctx" . "component" "worker") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "cw.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.worker.terminationGracePeriodSeconds }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- include "cw.scheduling" . | nindent 6 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["pnpm", "--filter", "@cw/worker", "start"]
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: HEALTH_PORT
              value: {{ .Values.worker.healthPort | quote }}
          envFrom:
            - configMapRef:
                name: {{ include "cw.fullname" . }}-config
            - secretRef:
                name: {{ include "cw.secretName" . }}
          ports:
            - name: health
              containerPort: {{ .Values.worker.healthPort }}
          # /healthz reports 500 when the outbox relay loop stalls, so a hung
          # worker restarts instead of silently halting event delivery.
          readinessProbe:
            httpGet: { path: /readyz, port: health }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: health }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources: {{- toYaml .Values.worker.resources | nindent 12 }}
{{- if and .Values.worker.autoscaling.enabled (not .Values.worker.keda.enabled) }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "cw.fullname" . }}-worker
  labels: {{- include "cw.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "cw.fullname" . }}-worker
  minReplicas: {{ .Values.worker.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.worker.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.worker.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
