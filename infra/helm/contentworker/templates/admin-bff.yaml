{{- if .Values.adminBff.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cw.fullname" . }}-admin-bff
  labels: {{- include "cw.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.adminBff.replicas }}
  selector:
    matchLabels: {{- include "cw.selectorLabels" (dict "ctx" . "component" "admin-bff") | nindent 6 }}
  template:
    metadata:
      labels: {{- include "cw.selectorLabels" (dict "ctx" . "component" "admin-bff") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "cw.serviceAccountName" . }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: admin-bff
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["pnpm", "--filter", "@cw/admin-bff", "start"]
          env:
            - name: PORT
              value: {{ .Values.adminBff.port | quote }}
            - name: CW_API_URL
              value: {{ .Values.adminBff.apiUrl | default (printf "http://%s-api:80" (include "cw.fullname" .)) | quote }}
            - name: OIDC_DEFAULT_SPACE
              value: {{ .Values.config.seedSpaceId | quote }}
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "cw.secretName" . }}
                  key: SESSION_SECRET
                  optional: true
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "cw.secretName" . }}
                  key: ADMIN_TOKEN
            {{- range $k, $v := .Values.adminBff.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "cw.fullname" . }}-config
          ports:
            - name: http
              containerPort: {{ .Values.adminBff.port }}
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
          resources: {{- toYaml .Values.adminBff.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cw.fullname" . }}-admin-bff
  labels: {{- include "cw.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector: {{- include "cw.selectorLabels" (dict "ctx" . "component" "admin-bff") | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
{{- end }}
