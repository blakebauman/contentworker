{{- if .Values.secrets.create -}}
{{- /* Dev/local convenience only. In cloud, set secrets.create=false and have
       External Secrets Operator populate secrets.existingSecret instead. */ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cw.fullname" . }}-secrets
  labels: {{- include "cw.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secrets.data }}
  {{- if $v }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- end }}
{{- end }}
