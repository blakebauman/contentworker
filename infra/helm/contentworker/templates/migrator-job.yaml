{{- if .Values.migrator.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "cw.fullname" . }}-migrate-{{ .Release.Revision }}
  labels: {{- include "cw.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels: {{- include "cw.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "cw.serviceAccountName" . }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- include "cw.scheduling" . | nindent 6 }}
      containers:
        - name: migrator
          image: "{{ include "cw.appImage" (dict "root" . "app" "migrator") }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: {{ include "cw.appCommand" (dict "root" . "app" "migrator") }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          # Configmap carries EMBEDDINGS_DIM (pgvector column width) and any
          # SKIP_PGVECTOR override alongside the secret's DATABASE_URL.
          envFrom:
            - configMapRef:
                name: {{ include "cw.fullname" . }}-config
            - secretRef:
                name: {{ include "cw.secretName" . }}
{{- end }}
