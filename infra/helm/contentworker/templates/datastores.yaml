{{- /* Bundled datastores for LOCAL development only. In cloud, leave
        postgres.bundled / redis.bundled false and point DATABASE_URL / REDIS_URL
        at managed services via the secret. */ -}}
{{- if .Values.postgres.bundled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "cw.fullname" . }}-postgres
  labels: {{- include "cw.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "cw.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels: {{- include "cw.selectorLabels" (dict "ctx" . "component" "postgres") | nindent 6 }}
  template:
    metadata:
      labels: {{- include "cw.selectorLabels" (dict "ctx" . "component" "postgres") | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image | quote }}
          env:
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: POSTGRES_DB
              value: contentworker
          ports:
            - { name: pg, containerPort: 5432 }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: {{ .Values.postgres.storage }} } }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cw.fullname" . }}-postgres
  labels: {{- include "cw.labels" . | nindent 4 }}
spec:
  selector: {{- include "cw.selectorLabels" (dict "ctx" . "component" "postgres") | nindent 4 }}
  ports:
    - { name: pg, port: 5432, targetPort: pg }
{{- end }}
{{- if .Values.redis.bundled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cw.fullname" . }}-redis
  labels: {{- include "cw.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: {{- include "cw.selectorLabels" (dict "ctx" . "component" "redis") | nindent 6 }}
  template:
    metadata:
      labels: {{- include "cw.selectorLabels" (dict "ctx" . "component" "redis") | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image | quote }}
          ports:
            - { name: redis, containerPort: 6379 }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cw.fullname" . }}-redis
  labels: {{- include "cw.labels" . | nindent 4 }}
spec:
  selector: {{- include "cw.selectorLabels" (dict "ctx" . "component" "redis") | nindent 4 }}
  ports:
    - { name: redis, port: 6379, targetPort: redis }
{{- end }}
