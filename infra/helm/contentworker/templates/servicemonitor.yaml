{{- if .Values.metrics.serviceMonitor.enabled }}
{{- $root := . -}}
# Metrics Services for workloads that have no service of their own, plus
# ServiceMonitors for the Prometheus Operator. The API serves /metrics on its
# existing HTTP Service; worker/agent-worker expose it on their health port.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cw.fullname" . }}-worker-metrics
  labels:
    {{- include "cw.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  clusterIP: None
  selector: {{- include "cw.selectorLabels" (dict "ctx" . "component" "worker") | nindent 4 }}
  ports:
    - name: health
      port: {{ .Values.worker.healthPort }}
      targetPort: health
{{- if eq .Values.agents.runtime "temporal" }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cw.fullname" . }}-agent-worker-metrics
  labels:
    {{- include "cw.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent-worker
spec:
  clusterIP: None
  selector: {{- include "cw.selectorLabels" (dict "ctx" . "component" "agent-worker") | nindent 4 }}
  ports:
    - name: health
      port: {{ .Values.agentWorker.healthPort }}
      targetPort: health
{{- end }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "cw.fullname" . }}-api
  labels:
    {{- include "cw.labels" . | nindent 4 }}
    {{- with .Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels: {{- include "cw.releaseSelector" . | nindent 6 }}
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values: [api, api-management, api-delivery, api-preview]
  endpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.metrics.serviceMonitor.interval }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "cw.fullname" . }}-worker
  labels:
    {{- include "cw.labels" . | nindent 4 }}
    {{- with .Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels: {{- include "cw.releaseSelector" . | nindent 6 }}
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values: [worker, agent-worker]
  endpoints:
    - port: health
      path: /metrics
      interval: {{ .Values.metrics.serviceMonitor.interval }}
{{- if .Values.mcpServer.enabled }}
---
# MCP serves /metrics on its (cluster-internal) HTTP port — the ingress only
# routes the /mcp prefix, so it is not externally reachable.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "cw.fullname" . }}-mcp
  labels:
    {{- include "cw.labels" . | nindent 4 }}
    {{- with .Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels: {{- include "cw.releaseSelector" . | nindent 6 }}
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values: [mcp]
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.metrics.serviceMonitor.interval }}
{{- end }}
{{- end }}
