# Local / kind / minikube — fully self-contained (bundled Postgres + Redis).
#   helm install cw ./infra/helm/contentworker -f values-local.yaml
image:
  # Use a locally-built image (docker build -t contentworker:0.1.0 .). With
  # image.perApp: true, build and kind/minikube-load all five per-app images
  # (contentworker-{api,worker,mcp-server,agent-worker,migrator}:0.1.0) instead.
  pullPolicy: Never

config:
  aiProvider: anthropic
  embeddingsProvider: local
  extraEnv:
    ADMIN_UI_URL: "http://cms.localtest.me/dashboard"
    # The image sets NODE_ENV=production, which auto-enables the secure-secrets
    # guard; this install ships dev tokens, so switch the guard off explicitly.
    REQUIRE_SECURE_SECRETS: "false"
    # Local runs have no Anthropic key or object store; accept those fakes.
    ALLOW_FAKE_ADAPTERS: "ai,blob"
    # OIDC_* via extraEnv or External Secrets when wiring a real IdP.

# Bundled datastores; the default secret URLs already point at these services.
postgres:
  bundled: true
redis:
  bundled: true

secrets:
  create: true
  data:
    DATABASE_URL: "postgres://postgres:postgres@cw-contentworker-postgres:5432/contentworker"
    REDIS_URL: "redis://cw-contentworker-redis:6379"
    ADMIN_TOKEN: "dev-admin-token"
    MCP_TOKEN: "dev-mcp-token"
    SESSION_SECRET: "dev-session-secret-not-for-production"

api:
  replicas: 1
  autoscaling: { enabled: false }

ingress:
  enabled: true
  className: nginx
  host: cms.localtest.me
