apiVersion: v2
name: contentworker
description: >-
  Composable, AI-agentic-first headless CMS. Cloud-agnostic Kubernetes chart —
  one image, ROLE-gated API modules, worker, and MCP server. Postgres/Redis are
  external in cloud (managed) and optionally bundled for local development.
type: application
version: 0.1.0
appVersion: "0.1.0"
keywords:
  - cms
  - headless
  - mcp
  - ai
home: https://github.com/contentworker/contentworker
dependencies:
  # Self-hosted Temporal cluster for durable agent workflows. Off by default —
  # enable with temporal.enabled=true, or point agents.temporal.address at an
  # existing cluster instead. `helm dependency update` fetches it.
  - name: temporal
    version: "1.5.0"
    repository: https://go.temporal.io/helm-charts
    condition: temporal.enabled
