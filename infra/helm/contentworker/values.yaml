# Default values for contentworker. Override per-cloud via values-<cloud>.yaml.
# Identical container image across all clouds — only config/secret sources differ.

image:
  repository: contentworker
  tag: "0.1.0"
  pullPolicy: IfNotPresent
  # Slim per-app images: each service pulls <repository>-<app>:<tag>
  # (contentworker-api, -worker, -mcp-server, -agent-worker, -migrator) built
  # with `docker build --target app --build-arg APP=<app>` and runs node
  # directly (the slim images contain one standalone package, no pnpm).
  # Requires all five images in the registry. false = one shared image.
  perApp: false

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  # Cloud workload-identity annotations (IRSA / GCP WI / Azure WI) go here.
  annotations: {}

# Non-secret configuration, surfaced to every workload via a ConfigMap.
config:
  # AIProvider: anthropic | azure-openai
  aiProvider: anthropic
  # EmbeddingsProvider: "" (disabled) | local | azure-openai | openai
  # (openai = any OpenAI-compatible /v1 endpoint: OpenAI, Ollama, vLLM, TEI —
  # the self-hostable path; API key goes in the secret as EMBEDDINGS_API_KEY.)
  embeddingsProvider: local
  embeddingsDim: "1536"
  # Only for embeddingsProvider=openai:
  embeddingsBaseUrl: ""
  embeddingsModel: ""
  # VectorStore swap: "" (pgvector via DATABASE_URL) | qdrant
  vectorProvider: ""
  qdrantUrl: ""
  qdrantCollection: ""
  # Lexical search swap: "" (Postgres FTS) | opensearch (BM25 at scale;
  # password goes in the secret as OPENSEARCH_PASSWORD)
  searchProvider: ""
  opensearchUrl: ""
  opensearchUsername: ""
  opensearchIndex: ""
  seedSpaceId: space-1
  seedEnvId: main
  seedDefaultLocale: en-US
  seedLocales: en-US
  # Corpus multiplier for SEED_DEV bootstraps: 1 = demo, larger = load-test data.
  seedScale: "1"
  # Delivery cache entry TTL, seconds — a GC bound; tag invalidation stays the
  # correctness mechanism.
  deliveryCacheTtlSeconds: "86400"
  # TTL for cached delivery LIST results, seconds. Shorter than the single-entry
  # TTL because list invalidation tags are per content type, not per entry.
  deliveryListTtlSeconds: "3600"
  # Retention for relayed outbox rows + webhook delivery records, hours
  # (the worker sweeps hourly; RETENTION_INTERVAL_MS in extraEnv to change).
  eventRetentionHours: "168"
  # Extra non-secret env (e.g. AZURE_OPENAI_ENDPOINT, AZURE_OPENAI_API_VERSION).
  extraEnv: {}

# Blob/asset storage — any S3-compatible endpoint (S3, R2, MinIO, GCS interop).
# Empty bucket → in-memory fake blob store; a persistent install then refuses to
# boot unless ALLOW_FAKE_ADAPTERS accepts it (see docs/configuration.md).
# Credentials: prefer workload identity (IRSA / GCP WI / Azure WI) on the
# ServiceAccount; static keys go in the secret as AWS_ACCESS_KEY_ID/-SECRET.
blob:
  bucket: ""
  # Custom endpoint for MinIO / R2 / GCS interop; empty for native S3.
  endpoint: ""
  region: ""
  # true for MinIO and most S3-compatibles.
  forcePathStyle: false
  # When set, download URLs are unsigned public URLs under this base.
  publicBaseUrl: ""

# Secrets. In cloud, set create=false and point existingSecret at one populated
# by External Secrets Operator from the cloud's secret manager. For local dev,
# create=true writes the values below into a Secret (NOT for production).
secrets:
  create: true
  existingSecret: ""
  data:
    DATABASE_URL: "postgres://postgres:postgres@contentworker-postgres:5432/contentworker"
    REDIS_URL: "redis://contentworker-redis:6379"
    # Production: leave empty here and populate via External Secrets Operator.
    # Local dev: override in values-local.yaml with known dev tokens.
    ADMIN_TOKEN: ""
    MCP_TOKEN: ""
    ANTHROPIC_API_KEY: ""
    AZURE_OPENAI_API_KEY: ""
    # Bearer token for embeddingsProvider=openai endpoints that authenticate.
    EMBEDDINGS_API_KEY: ""
    # For config.vectorProvider=qdrant / config.searchProvider=opensearch.
    QDRANT_API_KEY: ""
    OPENSEARCH_PASSWORD: ""
    # Static S3-compatible credentials (MinIO etc.); leave empty with workload identity.
    AWS_ACCESS_KEY_ID: ""
    AWS_SECRET_ACCESS_KEY: ""

# --- API (Management + Delivery + Preview) -------------------------------------
# Run as one combined Deployment (role=all) or split into independently-scaled
# roles. When split.enabled=true, three Deployments are created.
api:
  replicas: 2
  role: all
  port: 8787
  # Prometheus /metrics listener — separate from the API port so the ingress
  # (path /) never publishes process internals.
  metricsPort: 9464
  split:
    enabled: false
    delivery: { replicas: 3 }
    management: { replicas: 2 }
    preview: { replicas: 1 }
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: "1", memory: 512Mi }
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

worker:
  replicas: 1
  # Health + Prometheus metrics port (/healthz fails when the relay stalls).
  healthPort: 9464
  # Queue-depth-based autoscaling via KEDA (requires KEDA in the cluster).
  # Preferred over the CPU HPA for the worker: the BullMQ backlog, not CPU, is
  # the real load signal. When enabled it replaces worker.autoscaling (the CPU
  # HPA is not rendered) and manages replicas between min and max.
  keda:
    enabled: false
    # Redis host:port for the KEDA redis scaler (KEDA cannot parse REDIS_URL).
    redisAddress: ""
    # Scale out when the events wait list exceeds this many jobs per replica.
    listLength: "100"
    minReplicas: 1
    maxReplicas: 10
    # Key in the platform secret holding the Redis password, for clusters with
    # AUTH (rendered as a TriggerAuthentication). Empty = no auth.
    passwordSecretKey: ""
  # Drain window for in-flight dispatches on rotation. Raise (e.g. 600) when
  # in-process agents run on publish — a dispatch can then take minutes.
  terminationGracePeriodSeconds: 120
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: "1", memory: 512Mi }
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

# --- Agents ---------------------------------------------------------------------
# The worker's on-publish hooks (enrich, moderate) plus the durable agent
# workflows (enrich/moderate/curate/repurpose).
agents:
  # Run the enrich agent when entries are published.
  enrich: false
  # Run the moderation agent when entries are published (classify + hold).
  moderate: false
  # Apply agent output automatically; false routes proposals to human review.
  autoApply: false
  # Run recurring agent jobs (cron-based agent-schedules) from the worker.
  # AI_AGENT_* budget vars and AGENT_SCHEDULE_* caps go in config.extraEnv.
  schedules: false
  # in-process = non-durable, runs inside the worker (dev / single node).
  # temporal  = durable execution: deploys the agent-worker (workflow host) and
  #             the worker starts workflows on the Temporal cluster.
  runtime: in-process
  temporal:
    # Temporal frontend address. Empty = the bundled subchart's frontend
    # service (<release>-temporal-frontend:7233) when temporal.enabled=true.
    address: ""
    namespace: default

# Temporal workflow + activity host (@cw/agent-worker). Deployed automatically
# when agents.runtime=temporal.
agentWorker:
  replicas: 1
  # Health + Prometheus metrics port (healthy while the Temporal worker polls).
  healthPort: 9464
  # Drain window for in-flight Temporal activities on rotation.
  terminationGracePeriodSeconds: 120
  resources:
    requests: { cpu: 100m, memory: 512Mi }
    limits: { cpu: "1", memory: 1Gi }

# Bundled self-hosted Temporal cluster (official chart via go.temporal.io/helm-charts;
# run `helm dependency update` first). Off by default — in cloud you can instead set
# agents.temporal.address to an existing cluster or Temporal Cloud. Persistence below
# targets the platform's own Postgres (the bundled dev instance by default — override
# host/user/password or use existingSecret for managed Postgres; the chart's schema
# job creates the databases and applies migrations via Helm hooks).
temporal:
  enabled: false
  server:
    replicaCount: 1
    config:
      persistence:
        defaultStore: default
        visibilityStore: visibility
        datastores:
          default:
            sql:
              createDatabase: true
              manageSchema: true
              pluginName: postgres12_pgx
              driverName: postgres12_pgx
              databaseName: temporal
              connectAddr: "contentworker-postgres:5432"
              connectProtocol: tcp
              user: postgres
              password: postgres
          visibility:
            sql:
              createDatabase: true
              manageSchema: true
              pluginName: postgres12_pgx
              driverName: postgres12_pgx
              databaseName: temporal_visibility
              connectAddr: "contentworker-postgres:5432"
              connectProtocol: tcp
              user: postgres
              password: postgres
  web:
    enabled: true

mcpServer:
  enabled: true
  replicas: 2
  port: 8788
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: "1", memory: 512Mi }

migrator:
  enabled: true
  # Set true when the database lacks the pgvector extension (disables the
  # content_embeddings schema step; semantic search needs it).
  skipPgvector: false

ingress:
  enabled: false
  className: nginx
  annotations: {}
  host: cms.example.com
  tls: false

# Bundled datastores for LOCAL dev only. In cloud these stay false and you point
# DATABASE_URL/REDIS_URL at managed services via the secret.
postgres:
  bundled: false
  image: pgvector/pgvector:pg16
  storage: 2Gi
redis:
  bundled: false
  image: redis:7-alpine

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Container-level hardening applied to every app container (api, worker,
# agent-worker, mcp, migrator).
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities: { drop: ["ALL"] }
  seccompProfile: { type: RuntimeDefault }
  # tsx compiles in-memory but esbuild can spill to /tmp; set true and mount an
  # emptyDir at /tmp to tighten further.
  readOnlyRootFilesystem: false

# Scheduling knobs applied to every app workload (bundled dev datastores excluded).
scheduling:
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []

# PodDisruptionBudgets for multi-replica workloads. Single-replica workloads are
# skipped automatically — a PDB there would block node drains.
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Default-deny ingress to all chart pods, with allowances for the API/MCP
# service ports, worker/agent-worker metrics, and the bundled datastores.
# Off by default — requires a NetworkPolicy-enforcing CNI.
networkPolicy:
  enabled: false
  # Additional `from` peers for api/mcp ingress (empty = any in-cluster peer).
  ingressFrom: []

# Prometheus Operator scrape config for /metrics (api on its HTTP port,
# worker/agent-worker on their health port).
metrics:
  serviceMonitor:
    enabled: false
    interval: 30s
    # Extra labels for ServiceMonitor discovery (e.g. release: prom-stack for
    # kube-prometheus-stack installs).
    labels: {}
