# Local contentworker stack: Postgres + Redis + migrator + API + worker.
#
#   docker compose up --build
#
# API → http://localhost:8787  (CMA: dev-cma-key, CDA: dev-cda-key, CPA: dev-cpa-key)
# The migrator runs once to apply schema, then the api/worker start.

x-app-env: &app-env
  DATABASE_URL: postgres://postgres:postgres@postgres:5432/contentworker
  REDIS_URL: redis://redis:6379

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: contentworker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  migrator:
    build: .
    command: ["pnpm", "--filter", "@cw/migrator", "start"]
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    command: ["pnpm", "--filter", "@cw/api", "start"]
    environment:
      <<: *app-env
      PORT: "8787"
      ROLE: all
      # Bootstrap a usable dev space + keys + demo content (idempotent).
      SEED_DEV: "true"
      SEED_LOCALES: "en-US,de-DE"
    ports:
      - "8787:8787"
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  # Admin SPA: built and served by vite preview, proxying API paths to `api`
  # (same-origin, so no CORS). Open http://localhost:5173.
  admin:
    build: .
    command:
      - sh
      - -c
      - "pnpm --filter @cw/admin build && pnpm --filter @cw/admin exec vite preview --host 0.0.0.0"
    environment:
      CW_API_URL: http://api:8787
      CW_ADMIN_PORT: "5173"
    ports:
      - "5173:5173"
    depends_on:
      - api

  worker:
    build: .
    command: ["pnpm", "--filter", "@cw/worker", "start"]
    environment:
      <<: *app-env
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  pgdata:
