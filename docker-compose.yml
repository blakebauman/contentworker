# Local contentworker stack: Postgres + Redis + migrator + API + worker.
#
#   docker compose up --build
#
# API → http://localhost:8787  (CMA: dev-cma-key, CDA: dev-cda-key, CPA: dev-cpa-key)
# The migrator runs once to apply schema, then the api/worker start.
#
# PRODUCTION: do not use this file as-is. Set SEED_DEV=false, rotate all tokens
# (ADMIN_TOKEN, CMA_KEY, CDA_KEY, CPA_KEY, MCP_TOKEN) via .env, and set
# REQUIRE_SECURE_SECRETS=true on the API. See docs/configuration.md.

x-app-env: &app-env
  DATABASE_URL: postgres://postgres:postgres@postgres:5432/contentworker
  REDIS_URL: redis://redis:6379
  # Dockerfile sets NODE_ENV=production; allow dev tokens + SEED_DEV for local compose.
  REQUIRE_SECURE_SECRETS: "false"
  # Local deterministic embeddings + pgvector (matches Helm values-local.yaml).
  # For real local RAG, point at any OpenAI-compatible endpoint instead:
  #   EMBEDDINGS_PROVIDER: openai
  #   EMBEDDINGS_BASE_URL: http://host.docker.internal:11434/v1   # e.g. Ollama
  #   EMBEDDINGS_MODEL: nomic-embed-text
  #   EMBEDDINGS_DIM: "768"
  EMBEDDINGS_PROVIDER: local
  # No Anthropic key / object store locally: accept the stub AI + fake blob
  # (persistent installs refuse to boot on unallowed fakes otherwise).
  ALLOW_FAKE_ADAPTERS: "ai,blob"
  # Optional search-backend swaps (see docs/configuration.md):
  #   VECTOR_PROVIDER: qdrant        QDRANT_URL: http://host.docker.internal:6333
  #   SEARCH_PROVIDER: opensearch    OPENSEARCH_URL: http://host.docker.internal:9200

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: contentworker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  migrator:
    build: .
    command: ["pnpm", "--filter", "@cw/migrator", "start"]
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    command: ["pnpm", "--filter", "@cw/api", "start"]
    environment:
      <<: *app-env
      PORT: "8787"
      ROLE: all
      # Bootstrap a usable dev space + keys + demo content (idempotent).
      SEED_DEV: "true"
      SEED_LOCALES: "en-US,de-DE"
      # AI entry generation: set ANTHROPIC_API_KEY (e.g. in a .env file) to use the
      # real model; unset, the API falls back to a dev stub that returns placeholders.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      SESSION_SECRET: dev-session-secret-not-for-production
      ADMIN_UI_URL: http://localhost:5173/dashboard
      OIDC_DEFAULT_SPACE: space-1
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-http://localhost:5173/auth/oidc/callback}
      OIDC_GROUP_ROLE_MAP: ${OIDC_GROUP_ROLE_MAP:-{}}
    ports:
      - "8787:8787"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8787/healthz"]
      interval: 10s
      timeout: 3s
      retries: 6
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  # Admin SPA: built and served by vite preview, proxying API paths to `api`
  # (same-origin, so no CORS). Open http://localhost:5173. Uses the image's
  # `dev` stage — vite is a dev dependency, absent from the prod stage.
  admin:
    build:
      context: .
      target: dev
    command:
      - sh
      - -c
      - "pnpm --filter @cw/admin build && pnpm --filter @cw/admin exec vite preview --host 0.0.0.0"
    environment:
      CW_API_URL: http://api:8787
      CW_ADMIN_PORT: "5173"
      VITE_SSO_LOGIN_URL: ${VITE_SSO_LOGIN_URL:-}
    ports:
      - "5173:5173"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  worker:
    build: .
    command: ["pnpm", "--filter", "@cw/worker", "start"]
    environment:
      <<: *app-env
      HEALTH_PORT: "9464"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9464/healthz"]
      interval: 10s
      timeout: 3s
      retries: 6
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  pgdata:
