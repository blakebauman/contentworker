name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    # Postgres/Redis for the opt-in adapter contract tests. The migrator applies
    # the schema, then TEST_DATABASE_URL / TEST_REDIS_URL switch those suites on
    # (they skip otherwise).
    services:
      postgres:
        # pgvector image: the migrator applies the content_embeddings schema
        # (CREATE EXTENSION vector) alongside the Drizzle migrations.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: contentworker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/contentworker_test
      TEST_REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (biome)
        run: pnpm lint

      - name: Lint Helm chart
        run: |
          helm dependency update infra/helm/contentworker
          helm lint infra/helm/contentworker

      # Render the chart with every committed values file so per-values
      # regressions (a value referenced by no template, a broken conditional)
      # fail CI, not an install.
      - name: Template Helm chart (all values files)
        run: |
          helm template cw infra/helm/contentworker > /dev/null
          helm template cw infra/helm/contentworker --set image.perApp=true > /dev/null
          for f in infra/helm/contentworker/values-*.yaml; do
            echo "--- ${f}"
            helm template cw infra/helm/contentworker -f "${f}" > /dev/null
          done

      - name: Typecheck
        run: pnpm -r --filter '!@cw/migrator' run typecheck

      - name: Apply migrations to the test database
        run: pnpm --filter @cw/migrator start
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

      - name: Test (incl. Postgres + Redis adapter contract suites)
        run: pnpm -r test

      # Second pass with the Cloudflare edge target's driver options
      # (postgres.js fetch_types off, as used behind Hyperdrive).
      - name: Store contract suite with edge driver options
        run: pnpm --filter @cw/adapter-store-postgres test
        env:
          TEST_PG_FETCH_TYPES: "false"

      - name: Build admin
        run: pnpm --filter @cw/admin build

      # Validates the Cloudflare Worker bundles for workerd (all bindings,
      # nodejs_compat) and enforces a size ceiling. No deploy.
      - name: Edge worker bundle (dry-run)
        run: |
          pnpm --filter @cw/edge build
          size=$(gzip -c apps/edge/dist/main.js | wc -c)
          echo "edge bundle gzip size: ${size} bytes"
          test "$size" -lt 5000000

  # Builds every slim per-app image (`pnpm deploy` → --target app) and boots
  # the two with distinct runtime shapes: proves each pruned dependency graph
  # is complete, not just that the Dockerfile parses. The migrator matters
  # most — it resolves the drizzle migrations dir from inside the deployed
  # package, a path that only exists correctly in this layout.
  slim-image:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: contentworker_smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5

      # Layers up to `ARG APP` are shared, so the marginal cost per extra app
      # is a single `pnpm deploy`.
      - name: Build all five slim images
        run: |
          docker build --target app --build-arg APP=api \
            --build-arg APP_ENTRY=src/server.ts -t contentworker-api:ci .
          for a in worker mcp-server agent-worker migrator; do
            docker build --target app --build-arg APP="$a" -t "contentworker-$a:ci" .
          done

      - name: Smoke-test migrator (applies migrations from the deployed layout)
        run: >
          docker run --rm --network host
          -e DATABASE_URL=postgres://postgres:postgres@localhost:5432/contentworker_smoke
          contentworker-migrator:ci

      # The image sets NODE_ENV=production, so the fail-closed secrets guard is
      # active — random ≥32-char secrets keep that path honest instead of
      # bypassing it with NODE_ENV=development.
      - name: Smoke-test (in-memory store boot)
        run: |
          S=$(openssl rand -hex 24)
          docker run -d --name api -p 8787:8787 \
            -e ADMIN_TOKEN="a$S" -e CMA_KEY="b$S" -e CDA_KEY="c$S" \
            -e CPA_KEY="d$S" -e SESSION_SECRET="e$S" \
            contentworker-api:ci
          ok=""
          for i in $(seq 1 30); do
            curl -sf http://localhost:8787/healthz > /dev/null && ok=1 && break
            sleep 2
          done
          [ "$ok" = "1" ] || { docker logs api; exit 1; }
          curl -sf http://localhost:8787/readyz
          docker rm -f api
