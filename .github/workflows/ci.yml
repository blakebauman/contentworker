name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    # Postgres/Redis for the opt-in adapter contract tests. The migrator applies
    # the schema, then TEST_DATABASE_URL / TEST_REDIS_URL switch those suites on
    # (they skip otherwise).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: contentworker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/contentworker_test
      TEST_REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (biome)
        run: pnpm lint

      - name: Lint Helm chart
        run: |
          helm dependency update infra/helm/contentworker
          helm lint infra/helm/contentworker

      - name: Typecheck
        run: pnpm -r --filter '!@cw/migrator' run typecheck

      - name: Apply migrations to the test database
        run: pnpm --filter @cw/migrator start
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

      - name: Test (incl. Postgres + Redis adapter contract suites)
        run: pnpm -r test

      - name: Build admin
        run: pnpm --filter @cw/admin build
